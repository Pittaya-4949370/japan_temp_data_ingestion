name: Daily Japan Weather Pipeline

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional backfill start date, e.g. 2000-01-01"
        required: false
        type: string
      end_date:
        description: "Optional backfill end date, e.g. 2026-06-26"
        required: false
        type: string
  schedule:
    # GitHub cron uses UTC. 01:37 UTC = 10:37 Japan time / 08:37 Thailand time.
    - cron: "37 1 * * *"

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Open-Meteo daily weather
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          if [ -n "$START_DATE" ] && [ -n "$END_DATE" ]; then
            python src/fetch_open_meteo_daily.py \
              --start-date "$START_DATE" \
              --end-date "$END_DATE" \
              --cities config/cities.csv \
              --out data/weather_daily
          else
            python src/fetch_open_meteo_daily.py \
              --mode yesterday \
              --cities config/cities.csv \
              --out data/weather_daily
          fi

      - name: Create analysis summary files
        run: python src/analyze_weather_trends.py --master data/weather_daily_master.csv --out output

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/ output/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Japan weather data"
            git push
          fi
